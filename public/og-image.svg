<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Globe circle -->
  <circle cx="950" cy="315" r="220" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="2"/>
  <circle cx="950" cy="315" r="170" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <circle cx="950" cy="315" r="120" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
  <!-- Globe lines -->
  <ellipse cx="950" cy="315" rx="220" ry="80" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <ellipse cx="950" cy="315" rx="80" ry="220" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <line x1="730" y1="315" x2="1170" y2="315" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <line x1="950" y1="95" x2="950" y2="535" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <!-- Airplane icon -->
  <g transform="translate(880,220) scale(1.2) rotate(-15)" fill="rgba(96,165,250,0.6)">
    <path d="M24 4.6c-1.6 0-3 0.8-3.8 2L14 12H7l-5 3h3l-2 3 4-1v5l-2 2h3l2-2 2 2h3l-2-2v-5l4 1-2-3h7l-6.2-5.4c-0.8-1.2-2.2-2-3.8-2z"/>
  </g>
  <!-- Brand name -->
  <text x="80" y="200" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="62" fill="white" letter-spacing="-1">Diplomatic</text>
  <text x="80" y="265" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="62" fill="white" letter-spacing="-1">Xpress Logistics</text>
  <!-- Accent bar -->
  <rect x="80" y="290" width="200" height="5" rx="3" fill="url(#accent)"/>
  <!-- Tagline -->
  <text x="80" y="340" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="26" fill="rgba(148,163,184,1)">Global Consignment &amp; Freight</text>
  <!-- Features -->
  <text x="80" y="400" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="20" fill="rgba(96,165,250,0.9)">✈ Air Cargo  ·  📦 Tracking  ·  🌍 120+ Countries  ·  🛃 Customs</text>
  <!-- CTA -->
  <rect x="80" y="440" width="280" height="52" rx="26" fill="url(#accent)"/>
  <text x="220" y="473" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="white" text-anchor="middle">Track Your Shipment →</text>
  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(59,130,246,0.15)"/>
  <text x="600" y="620" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="14" fill="rgba(148,163,184,0.7)" text-anchor="middle">www.diplomaticxpress.com  ·  Your Trusted Logistics Partner</text>
</svg>